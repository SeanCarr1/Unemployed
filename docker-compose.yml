services:
  db:
    image: postgres
    container_name: unemployed-db
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    env_file:
      - .env
    ports:
      - "5432:5432"

  backend:
    build:
      context: ./backend
    container_name: unemployed-backend
    command: python manage.py runserver 0.0.0.0:8000
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
    container_name: unemployed-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    stdin_open: true     # for hot reload (optional)
    tty: true
    environment:
      - CHOKIDAR_USEPOLLING=true

volumes:
  postgres_data: