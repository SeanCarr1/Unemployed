services:
  backend:
    build:
      context: ./backend
    env_file:
      - ./backend/.env.dev
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on: []

  frontend:
    build:
      context: ./frontend
    env_file:
      - ./frontend/.env.dev
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    depends_on: []